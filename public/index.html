<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Plus — AI & Developer News</title>
  <meta name="description" content="AI, Developer Tools & Tech Industry News - Updated Daily">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="container header-content">
      <div class="header-left">
        <h1>Tech Plus By Ramzi</h1>
        <p class="tagline">AI, Developer Tools & Tech Industry News</p>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="container">
    <div class="search-bar">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search articles..." autocomplete="off">
    </div>

    <div class="meta-bar">
      <span class="last-updated" id="lastUpdated">Loading...</span>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="AI">AI</button>
        <button class="filter-btn" data-filter="Developer Tools">Dev Tools</button>
        <button class="filter-btn" data-filter="Web Development">Web Dev</button>
        <button class="filter-btn" data-filter="Tech Industry">Industry</button>
        <button class="filter-btn bookmark-filter" data-filter="bookmarks">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
          Saved
        </button>
      </div>
    </div>

    <section class="news-grid" id="newsGrid">
      <!-- News cards injected by JS -->
    </section>
  </main>

  <footer>
    <div class="container">
      <p>Updated daily at 8:00 AM</p>
    </div>
  </footer>

  <script>
    let allArticles = [];
    let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');

    async function loadNews() {
      try {
        const res = await fetch('news-data.json');
        const data = await res.json();
        allArticles = data.articles;

        const updated = new Date(data.lastUpdated);
        document.getElementById('lastUpdated').textContent =
          `Last updated: ${updated.toLocaleDateString('en-US', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          })}`;

        renderNews(allArticles);
      } catch (err) {
        document.getElementById('newsGrid').innerHTML =
          '<p class="error">Failed to load news. Please try again.</p>';
      }
    }

    function isBookmarked(id) {
      return bookmarks.includes(id);
    }

    function toggleBookmark(id, btn) {
      if (isBookmarked(id)) {
        bookmarks = bookmarks.filter(b => b !== id);
        btn.classList.remove('bookmarked');
      } else {
        bookmarks.push(id);
        btn.classList.add('bookmarked');
      }
      localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
    }

    function shareTwitter(title, url) {
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}`, '_blank');
    }

    function shareLinkedIn(url) {
      window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}`, '_blank');
    }

    function copyLink(url, btn) {
      navigator.clipboard.writeText(url).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
      });
    }

    function renderNews(articles) {
      const grid = document.getElementById('newsGrid');

      if (articles.length === 0) {
        grid.innerHTML = '<p class="no-results">No articles found</p>';
        return;
      }

      grid.innerHTML = articles.map(article => {
        const isTrending = article.trendingScore && article.trendingScore > 70;
        const readTime = article.readingTime || 1;
        const bookmarked = isBookmarked(article.id);

        return `
        <article class="news-card ${isTrending ? 'trending' : ''}" data-category="${article.category}">
          <div class="card-header">
            <div class="card-badges">
              <span class="category ${article.category.toLowerCase().replace(/\s+/g, '-')}">${article.category}</span>
              ${isTrending ? '<span class="trending-badge">🔥 Trending</span>' : ''}
            </div>
            <button class="bookmark-btn ${bookmarked ? 'bookmarked' : ''}" onclick="toggleBookmark(${article.id}, this)" aria-label="Bookmark">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="${bookmarked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
              </svg>
            </button>
          </div>
          <h2><a href="${article.url}" target="_blank" rel="noopener">${article.title}</a></h2>
          <p class="summary">${article.summary}</p>
          <div class="card-footer">
            <div class="meta">
              <span class="source">${article.source}</span>
              <span class="reading-time">⏱️ ${readTime} min read</span>
              <span class="date">${formatDate(article.date)}</span>
            </div>
            <div class="share-buttons">
              <button onclick="shareTwitter('${article.title.replace(/'/g, "\\'")}', '${article.url}')" title="Share on Twitter">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              </button>
              <button onclick="shareLinkedIn('${article.url}')" title="Share on LinkedIn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
              </button>
              <button class="copy-btn" onclick="copyLink('${article.url}', this)" title="Copy link">Copy</button>
            </div>
          </div>
        </article>
      `}).join('');
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diff = Math.floor((now - date) / (1000 * 60 * 60 * 24));

      if (diff === 0) return 'Today';
      if (diff === 1) return 'Yesterday';
      if (diff < 7) return `${diff} days ago`;
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // Current filter state
    let currentFilter = 'all';
    let currentSearch = '';

    function applyFilters() {
      let filtered = allArticles;

      // Handle bookmarks filter
      if (currentFilter === 'bookmarks') {
        filtered = allArticles.filter(a => bookmarks.includes(a.id));
      }
      // Apply category filter
      else if (currentFilter !== 'all') {
        filtered = filtered.filter(a => a.category === currentFilter);
      }

      // Apply search filter
      if (currentSearch) {
        const query = currentSearch.toLowerCase();
        filtered = filtered.filter(a =>
          a.title.toLowerCase().includes(query) ||
          a.summary.toLowerCase().includes(query) ||
          a.source.toLowerCase().includes(query)
        );
      }

      renderNews(filtered);
    }

    // Filter functionality
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        applyFilters();
      });
    });

    // Search functionality
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', (e) => {
      currentSearch = e.target.value.trim();
      applyFilters();
    });

    // Dark mode toggle
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // Live refresh - check for updates every 5 minutes
    let lastUpdate = null;
    async function checkForUpdates() {
      try {
        const res = await fetch('news-data.json?t=' + Date.now());
        const data = await res.json();
        if (lastUpdate && data.lastUpdated !== lastUpdate) {
          // New data available - show notification
          showUpdateNotification();
        }
        lastUpdate = data.lastUpdated;
      } catch (err) {
        // Silent fail for background checks
      }
    }

    function showUpdateNotification() {
      const notification = document.createElement('div');
      notification.className = 'update-notification';
      notification.innerHTML = `
        <span>🔔 New articles available</span>
        <button onclick="location.reload()">Refresh</button>
        <button onclick="this.parentElement.remove()">✕</button>
      `;
      document.body.appendChild(notification);
    }

    // Start live refresh (every 5 minutes)
    setInterval(checkForUpdates, 5 * 60 * 1000);

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    loadNews();
  </script>
</body>
</html>
